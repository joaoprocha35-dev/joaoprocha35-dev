name: Generate snake animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: joaoprocha35-dev
          # Cores refinadas: Cobra em Ciano Neon e pontos combinando com seus commits (Roxo e Verde)
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#00f5d4&color_dots=#161b22,#4c1d95,#7c3aed,#a21caf,#10b981
            

      - name: Push snake.svg to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
